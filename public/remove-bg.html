<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas" style="display:none;"></canvas>
    <textarea id="result" style="width:100%; height:100px;"></textarea>
    <div id="status">Processing...</div>
    <script>
        const img = new Image();
        img.src = 'logo.png';
        img.crossOrigin = "anonymous";
        img.onload = () => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Remove dark/black background
            const threshold = 30; 
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                if (r < threshold && g < threshold && b < threshold) {
                    data[i+3] = 0;
                }
            }
            ctx.putImageData(imageData, 0, 0);
            
            const resultData = canvas.toDataURL('image/png');
            document.getElementById('result').value = resultData;
            document.getElementById('status').innerText = 'Done!';
        };
        img.onerror = () => {
            document.getElementById('status').innerText = 'Error loading image.';
        };
    </script>
</body>
</html>
